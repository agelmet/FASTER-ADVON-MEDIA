<!DOCTYPE html>
<html lang="el" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advon Media | Ψηφιακές Λύσεις Marketing</title>
    <meta name="description" content="Οι πιο αποτελεσματικές λύσεις marketing για τοπικές επιχειρήσεις." />
    <link rel="icon" href="https://assets.cdn.filesafe.space/NkFUgZER3rrdnofCwAIl/media/648dd017a1f733fa5b51e5e9.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Outfit:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['Cormorant Garamond', 'serif'],
              body: ['Outfit', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
          }
        }
      }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --cyan: #47c8f5;
        --cyan-soft: rgba(71, 200, 245, 0.12);
        --gold: #c9a84c;
        --gold-soft: rgba(201, 168, 76, 0.15);
        --void: #020405;
        --deep: #060a0d;
      }

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: var(--void); }
      ::-webkit-scrollbar-thumb { background: rgba(71,200,245,0.2); border-radius: 10px; }
      ::selection { background: rgba(71,200,245,0.2); color: #fff; }

      html { scroll-behavior: smooth; }
      body {
        background: var(--void);
        color: #e0e4e7;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        font-family: 'Outfit', sans-serif;
      }

      /* ═══ NOISE GRAIN ═══ */
      body::after {
        content: '';
        position: fixed; inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
        pointer-events: none; z-index: 10000; opacity: 0.5;
      }

      /* ═══ ROLLS ROYCE STARLIGHT CANVAS ═══ */
      #starlight-canvas {
        position: fixed; inset: 0;
        width: 100%; height: 100%;
        z-index: 0; pointer-events: none;
      }

      /* ═══ LASER BEAM SYSTEM ═══ */
      .laser-container {
        position: fixed; inset: 0;
        pointer-events: none; z-index: 1;
        overflow: hidden;
      }
      .laser-beam {
        position: absolute;
        width: 2px;
        height: 100%;
        top: 0;
        background: linear-gradient(180deg,
          transparent 0%,
          rgba(71,200,245,0.03) 10%,
          rgba(71,200,245,0.15) 30%,
          rgba(71,200,245,0.4) 50%,
          rgba(71,200,245,0.15) 70%,
          rgba(71,200,245,0.03) 90%,
          transparent 100%
        );
        animation: laser-drift 8s ease-in-out infinite;
        opacity: 0.5;
      }
      .laser-beam::after {
        content: '';
        position: absolute;
        inset: 0;
        width: 30px;
        left: -14px;
        background: linear-gradient(180deg, transparent, rgba(71,200,245,0.04) 40%, rgba(71,200,245,0.08) 50%, rgba(71,200,245,0.04) 60%, transparent);
        filter: blur(8px);
      }
      .laser-beam:nth-child(1) { left: 25%; animation-delay: 0s; animation-duration: 12s; }
      .laser-beam:nth-child(2) { left: 50%; animation-delay: -3s; animation-duration: 10s; opacity: 0.7; }
      .laser-beam:nth-child(3) { left: 75%; animation-delay: -6s; animation-duration: 14s; }
      @keyframes laser-drift {
        0%, 100% { opacity: 0.3; transform: scaleY(1); }
        50% { opacity: 0.7; transform: scaleY(1.02); }
      }

      /* ═══ HORIZONTAL LASER SWEEP ═══ */
      .laser-sweep {
        position: absolute;
        width: 100%; height: 1px;
        left: 0;
        background: linear-gradient(90deg, transparent, rgba(71,200,245,0.3), rgba(71,200,245,0.6), rgba(71,200,245,0.3), transparent);
        animation: sweep-down 15s linear infinite;
        filter: blur(0.5px);
        box-shadow: 0 0 15px rgba(71,200,245,0.15), 0 0 40px rgba(71,200,245,0.05);
      }
      @keyframes sweep-down {
        0% { top: -5%; opacity: 0; }
        5% { opacity: 1; }
        95% { opacity: 1; }
        100% { top: 105%; opacity: 0; }
      }

      /* ═══ CUSTOM CURSOR ═══ */
      .cursor-diamond {
        position: fixed;
        width: 10px; height: 10px;
        border: 1px solid var(--cyan);
        transform: translate(-50%, -50%) rotate(45deg);
        pointer-events: none;
        z-index: 99999;
        transition: width 0.4s cubic-bezier(.22,1,.36,1), height 0.4s cubic-bezier(.22,1,.36,1), border-color 0.3s, background 0.3s;
      }
      .cursor-diamond.hovering {
        width: 40px; height: 40px;
        background: rgba(71,200,245,0.06);
        border-color: var(--gold);
      }
      .cursor-trail {
        position: fixed;
        width: 3px; height: 3px;
        background: var(--cyan);
        border-radius: 50%;
        pointer-events: none;
        z-index: 99998;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .cursor-aura {
        position: fixed;
        width: 200px; height: 200px;
        background: radial-gradient(circle, rgba(71,200,245,0.04) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none; z-index: 0;
      }
      @media (hover: none) { .cursor-diamond, .cursor-trail, .cursor-aura { display: none !important; } }

      /* ═══ REVEAL ANIMATIONS ═══ */
      .rv {
        opacity: 0;
        transform: translateY(50px);
        transition: opacity 1.1s cubic-bezier(.16,1,.3,1), transform 1.1s cubic-bezier(.16,1,.3,1);
      }
      .rv.vis { opacity: 1; transform: translateY(0); }

      .rv-char {
        display: inline-block;
        opacity: 0;
        transform: translateY(40px) rotateX(-40deg);
        transition: opacity 0.6s cubic-bezier(.16,1,.3,1), transform 0.6s cubic-bezier(.16,1,.3,1);
      }
      .rv-char.vis { opacity: 1; transform: translateY(0) rotateX(0); }

      .rv-scale {
        opacity: 0; transform: scale(0.9);
        transition: opacity 1s cubic-bezier(.16,1,.3,1), transform 1s cubic-bezier(.16,1,.3,1);
      }
      .rv-scale.vis { opacity: 1; transform: scale(1); }

      .rv-line {
        width: 0;
        transition: width 1.2s cubic-bezier(.16,1,.3,1);
      }
      .rv-line.vis { width: 80px; }

      /* ═══ LUXURY TEXT SHIMMER ═══ */
      .lux-shimmer {
        background: linear-gradient(90deg, var(--cyan), #fff, var(--gold), var(--cyan));
        background-size: 400% 100%;
        -webkit-background-clip: text; background-clip: text;
        color: transparent;
        animation: lux-shine 8s ease-in-out infinite;
      }
      @keyframes lux-shine {
        0% { background-position: 100% 50%; }
        50% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
      }

      /* ═══ SECTION TRANSITION LINES ═══ */
      .section-line {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(71,200,245,0.12), rgba(201,168,76,0.08), rgba(71,200,245,0.12), transparent);
      }

      /* ═══ GLASS CARDS ═══ */
      .lux-glass {
        background: rgba(6,10,13,0.7);
        backdrop-filter: blur(24px) saturate(1.3);
        -webkit-backdrop-filter: blur(24px) saturate(1.3);
        border: 1px solid rgba(71,200,245,0.06);
        transition: border-color 0.6s ease, box-shadow 0.6s ease, transform 0.6s cubic-bezier(.22,1,.36,1);
      }
      .lux-glass:hover {
        border-color: rgba(71,200,245,0.15);
        box-shadow: 0 0 60px rgba(71,200,245,0.04), inset 0 0 30px rgba(71,200,245,0.02);
      }

      /* ═══ PORTFOLIO ═══ */
      .port-card {
        position: relative; overflow: hidden;
        border: 1px solid rgba(255,255,255,0.03);
        border-radius: 12px;
        transition: border-color 0.6s, transform 0.6s cubic-bezier(.22,1,.36,1);
        will-change: transform;
      }
      .port-card:hover { border-color: rgba(71,200,245,0.12); }
      .port-card img {
        transition: transform 1.4s cubic-bezier(.22,1,.36,1), filter 1s;
        will-change: transform;
      }
      .port-card:hover img { transform: scale(1.06); filter: brightness(0.5); }
      .port-card .port-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to top, rgba(2,4,5,0.97) 0%, rgba(2,4,5,0.5) 35%, transparent);
        opacity: 0; transition: opacity 0.6s;
        display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
      }
      .port-card:hover .port-overlay { opacity: 1; }
      .port-card .port-overlay > * {
        transform: translateY(12px); opacity: 0;
        transition: transform 0.5s cubic-bezier(.22,1,.36,1) 0.05s, opacity 0.4s 0.05s;
      }
      .port-card:hover .port-overlay > * { transform: translateY(0); opacity: 1; }
      .port-card:hover .port-overlay > *:nth-child(2) { transition-delay: 0.1s; }

      /* ═══ REVIEW ═══ */
      .rev-card { position: relative; }
      .rev-card::before {
        content: '"';
        position: absolute; top: 12px; right: 20px;
        font-family: 'Cormorant Garamond', serif;
        font-size: 100px; line-height: 1;
        color: rgba(201,168,76,0.04);
        pointer-events: none;
      }

      /* ═══ FAQ ═══ */
      .faq-row { border-bottom: 1px solid rgba(255,255,255,0.03); }
      .faq-row:hover { background: rgba(71,200,245,0.015); }
      .faq-btn svg { transition: transform 0.5s cubic-bezier(.22,1,.36,1); }
      .faq-btn.open svg { transform: rotate(45deg); }
      .faq-body { max-height: 0; overflow: hidden; transition: max-height 0.6s cubic-bezier(.22,1,.36,1); }

      /* ═══ HEADER ═══ */
      .hdr-scroll {
        background: rgba(2,4,5,0.9) !important;
        border-bottom-color: rgba(71,200,245,0.06) !important;
        box-shadow: 0 2px 40px rgba(0,0,0,0.6);
      }

      /* ═══ NAV LINK ═══ */
      .nav-a { position: relative; }
      .nav-a::after {
        content: ''; position: absolute; bottom: -2px; left: 0;
        width: 100%; height: 1px;
        background: linear-gradient(90deg, var(--cyan), var(--gold));
        transform: scaleX(0); transform-origin: right;
        transition: transform 0.5s cubic-bezier(.22,1,.36,1);
      }
      .nav-a:hover::after { transform: scaleX(1); transform-origin: left; }

      /* ═══ MAGNETIC BUTTON ═══ */
      .mag-btn { transition: transform 0.3s cubic-bezier(.22,1,.36,1); }

      /* ═══ CTA SHINE ═══ */
      .cta-shine { position: relative; overflow: hidden; }
      .cta-shine::before {
        content: ''; position: absolute; top: 0; left: -100%;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        transition: left 0.7s ease;
      }
      .cta-shine:hover::before { left: 100%; }

      /* ═══ LABEL BADGE ═══ */
      .lux-label {
        display: inline-flex; align-items: center; gap: 10px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px; letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--gold);
        padding: 6px 18px;
        border: 1px solid rgba(201,168,76,0.2);
        border-radius: 100px;
        background: rgba(201,168,76,0.04);
      }
      .lux-label .pulse-dot {
        width: 5px; height: 5px;
        background: var(--gold);
        border-radius: 50%;
        animation: pdot 2.5s ease-in-out infinite;
      }
      @keyframes pdot { 0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)} }

      /* ═══ PAGINATION ═══ */
      .pg-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: rgba(255,255,255,0.1);
        transition: all 0.5s cubic-bezier(.22,1,.36,1);
      }
      .pg-dot.active {
        width: 28px; border-radius: 3px;
        background: linear-gradient(90deg, var(--cyan), var(--gold));
        box-shadow: 0 0 12px rgba(71,200,245,0.3);
      }

      /* ═══ 3D TILT ═══ */
      .tilt-3d { will-change: transform; transform-style: preserve-3d; }

      /* ═══ HERO ENTRANCE ═══ */
      .hero-in {
        opacity: 0; transform: translateY(25px);
        animation: h-enter 1.2s cubic-bezier(.16,1,.3,1) forwards;
      }
      .hero-in:nth-child(1) { animation-delay: 0.2s; }
      .hero-in:nth-child(2) { animation-delay: 0.45s; }
      .hero-in:nth-child(3) { animation-delay: 0.7s; }
      .hero-in:nth-child(4) { animation-delay: 0.95s; }
      @keyframes h-enter { to { opacity: 1; transform: translateY(0); } }

      /* ═══ MOBILE MENU ═══ */
      .mob-panel { max-height: 0; overflow: hidden; transition: max-height 0.6s cubic-bezier(.22,1,.36,1); }
      .mob-panel.open { max-height: 400px; }

      main { transition: opacity 0.5s cubic-bezier(.4,0,.2,1); }
      .modal-open { overflow: hidden; }

      /* ═══ STAT DIVIDER ═══ */
      .stat-div { width: 1px; height: 40px; background: linear-gradient(to bottom, transparent, rgba(201,168,76,0.15), transparent); }

      /* ═══ GOLD LINE ACCENT ═══ */
      .gold-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent); }
    </style>
</head>
<body class="antialiased">

<!-- Cursor -->
<div class="cursor-diamond" id="cur-d"></div>
<div class="cursor-trail" id="cur-t"></div>
<div class="cursor-aura" id="cur-a"></div>

<!-- Starlight Canvas (Rolls-Royce) -->
<canvas id="starlight-canvas"></canvas>

<!-- Laser Beams -->
<div class="laser-container">
  <div class="laser-beam"></div>
  <div class="laser-beam"></div>
  <div class="laser-beam"></div>
  <div class="laser-sweep"></div>
</div>

<!-- Header -->
<header class="fixed top-0 left-0 right-0 z-50 border-b border-transparent transition-all duration-500" id="main-header">
  <div class="max-w-7xl mx-auto px-6 lg:px-8 h-20 flex items-center justify-between">
    <a href="#" class="flex items-center gap-3 group relative z-10">
      <img src="https://assets.cdn.filesafe.space/NkFUgZER3rrdnofCwAIl/media/648dd017a1f733fa5b51e5e9.png" alt="Advon Media" class="h-9 w-auto opacity-80 group-hover:opacity-100 transition-opacity" style="filter:drop-shadow(0 0 12px rgba(71,200,245,0.3))">
    </a>
    <nav id="desktop-nav" class="hidden md:flex items-center gap-9 text-[13px] font-medium tracking-wide"></nav>
    <div class="flex items-center gap-3">
      <button onclick="triggerLanguageSwitch()" id="mobile-lang-btn" class="md:hidden flex items-center gap-2 px-3 py-1.5 rounded-full border border-white/8 bg-white/3 text-[11px] font-bold text-white/50 hover:border-cyan-400/30 hover:text-cyan-400 transition-all cursor-pointer"></button>
      <button onclick="triggerLanguageSwitch()" id="lang-btn" class="hidden md:flex items-center gap-2 px-4 py-2 rounded-full bg-white/3 border border-white/8 text-[11px] font-bold text-white/50 hover:border-cyan-400/30 hover:text-cyan-400 transition-all cursor-pointer mag-btn"></button>
      <button class="md:hidden text-white/40 p-2 hover:text-cyan-400 transition-colors" id="mob-btn"><i data-lucide="menu" class="w-5 h-5"></i></button>
    </div>
  </div>
  <div class="md:hidden mob-panel bg-[#020405]/95 backdrop-blur-2xl border-b border-white/4" id="mob-menu">
    <nav id="mob-nav" class="flex flex-col p-6 gap-5 text-lg font-medium"></nav>
  </div>
</header>

<!-- Main -->
<main class="relative z-10" id="main-content">

  <!-- HERO -->
  <section class="relative min-h-screen flex items-center justify-center pt-20 pb-24 overflow-hidden">
    <div class="absolute inset-0 z-0">
      <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[700px] h-[700px] rounded-full" style="background:radial-gradient(circle,rgba(71,200,245,0.025) 0%,rgba(201,168,76,0.01) 40%,transparent 70%)"></div>
      <div class="absolute bottom-0 left-0 right-0 section-line"></div>
    </div>
    <div class="container max-w-6xl mx-auto px-6 lg:px-8 text-center relative z-10" id="hero-content"></div>
  </section>

  <!-- STATS -->
  <section class="py-16 relative z-10"><div class="max-w-5xl mx-auto px-6 lg:px-8" id="stats-grid"></div></section>

  <!-- SERVICES -->
  <section id="services" class="py-32 relative">
    <div class="section-line"></div>
    <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10 pt-16">
      <div id="services-header" class="mb-20"></div>
      <div class="grid md:grid-cols-3 gap-6" id="services-grid"></div>
      <div id="services-footer" class="mt-16 text-center"></div>

  </section>

  <!-- PORTFOLIO -->
  <section id="portfolio" class="py-32 relative">
    <div class="section-line"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[900px] h-[500px] rounded-full pointer-events-none" style="background:radial-gradient(ellipse,rgba(71,200,245,0.015),transparent 60%)"></div>
    <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10 pt-16">
      <div id="portfolio-header" class="mb-20"></div>
      <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mb-12 min-h-[400px]"></div>
      <div class="flex justify-center items-center gap-4">
        <button id="prev-btn" class="p-2.5 rounded-full border border-white/8 bg-white/3 text-white/40 hover:border-cyan-400/30 hover:text-cyan-400 transition-all disabled:opacity-15 disabled:cursor-not-allowed mag-btn"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
        <div id="pg-dots" class="flex gap-2 items-center"></div>
        <button id="next-btn" class="p-2.5 rounded-full border border-white/8 bg-white/3 text-white/40 hover:border-cyan-400/30 hover:text-cyan-400 transition-all disabled:opacity-15 disabled:cursor-not-allowed mag-btn"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
      </div>
    </div>
  </section>

  <!-- REVIEWS -->
  <section id="reviews" class="py-32 relative overflow-hidden">
    <div class="section-line"></div>
    <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10 pt-16">
      <div id="reviews-header" class="mb-20"></div>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5 mb-16" id="reviews-grid"></div>
      <div id="reviews-footer" class="text-center"></div>
    </div>
  </section>

  <!-- FAQ -->
  <section id="faq" class="py-24 relative">
    <div class="section-line"></div>
    <div class="max-w-3xl mx-auto px-6 lg:px-8 relative z-10 pt-16">
      <div id="faq-header" class="mb-12"></div>
      <div id="faq-container"></div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="py-32 relative">
    <div class="section-line"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[300px] rounded-full pointer-events-none" style="background:radial-gradient(circle,rgba(201,168,76,0.02),transparent 60%)"></div>
    <div class="max-w-4xl mx-auto px-6 lg:px-8 text-center relative z-10 pt-16" id="contact-container"></div>
  </section>
</main>

<!-- Footer -->
<footer class="py-10 border-t border-white/4 relative z-20">
  <div class="max-w-7xl mx-auto px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6" id="footer-content"></div>
</footer>

<!-- Modal -->
<div id="modal-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
  <div class="absolute inset-0 bg-[#020405]/92 backdrop-blur-xl transition-opacity duration-500 opacity-0" id="modal-bg"></div>
  <div id="modal-box" class="relative bg-[#060a0d]/95 backdrop-blur-2xl border border-white/8 w-full max-w-2xl max-h-[85vh] overflow-y-auto rounded-2xl shadow-2xl transform scale-95 opacity-0 transition-all duration-500">
    <div class="sticky top-0 p-4 flex justify-end bg-gradient-to-b from-[#060a0d] to-transparent z-10">
      <button onclick="closeModal()" class="p-2 rounded-full bg-white/4 hover:bg-white/8 text-white/40 hover:text-cyan-400 transition-all border border-white/8"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <div class="px-8 pb-10 pt-0">
      <h3 id="m-title" class="text-2xl font-display font-semibold text-white mb-8 text-center"></h3>
      <div id="m-img" class="mb-8 hidden"></div>
      <div id="m-body" class="space-y-4 text-white/50 leading-relaxed text-[15px]"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  ALL DATA — COMPLETELY PRESERVED
// ═══════════════════════════════════════════════════════════════

const services={el:[{id:'WEBSITE',icon:'globe',price:'ΔΩΡΕΑΝ',priceNote:'(μόνο 10.83€/μήνα hosting)',title:'Κατασκευή Ιστοσελίδας',shortDesc:'Επαγγελματική ιστοσελίδα που κατακτά υψηλές θέσεις στη Google.',features:['Επαγγελματικός σχεδιασμός','SEO βελτιστοποίηση','Mobile responsive','Παράδοση σε 5-10 ημέρες'],cta:'Δωρεάν Κατασκευή',more:'Περισσότερες πληροφορίες',modal:{title:'Δωρεάν Κατασκευή Ιστοσελίδας',body:['Δεν είναι κάποιο μάρκετινγκ τρικ, όντως η κατασκευή που κοστίζει κανονικά 700-2000€+, είναι εντελώς δωρεάν.','Το μόνο κόστος για εσάς που δεν μπορούμε να καλύψουμε έιναι η φιλοξενία της ιστοσελίδας σε σέρβερ στο διαδίκτυο (γνωστό και ως hosting) και το domain name (το www.παράδειγμα.gr). Τα αναλαμβάνουμε και τα 2 σαν διαδικασίες εμείς!','Το κάνουμε αυτό γιατί θέλουμε να προσθέσουμε όσες περισσότερες ιστοσελίδες γίνεται στο πορτφόλιο μας για να μπορούμε στο μέλλον και εμείς να έχουμε υψηλές τιμές και κέρδη.','Συνολικά είναι μόνο 10.83€/μήνα (που θα πληρώνατε όπως και να έχει, όπου και αν κατασκευάζατε μια ιστοσελίδα, όπως πληρώνουν και όλοι που ήδη έχουν).','Aναβαθμίστε την επαγγελματική σας παρουσία στο διαδίκτυο και μετατρέψτε τους επισκέπτες της ιστοσελίδας σας σε αφοσιωμένους πελάτες!','Το 2025, η κατοχή μιας επαγγελματικής ιστοσελίδας δεν είναι απλώς ένα επιπλέον εργαλείο — είναι μια αναγκαιότητα για κάθε ελεύθερο επαγγελματία και επιχείρηση που θέλει να ξεχωρίσει στον ψηφιακό κόσμο.','Μια καλά σχεδιασμένη ιστοσελίδα σας βοηθά να κατακτήσετε υψηλότερες θέσεις στις μηχανές αναζήτησης, καθώς η Google αξιολογεί τις ιστοσελίδες ως πιο αξιόπιστες και με πιο ολοκληρωμένο προφίλ.','Η ιστοσελίδα σας λειτουργεί ως η ψηφιακή σας βιτρίνα, ενισχύοντας την επαγγελματική σας εικόνα και προβάλλοντας την επιχείρησή σας ως σοβαρή και αξιόπιστη στους επισκέπτες. Επιπλέον, προσφέρει στους χρήστες εύκολη πρόσβαση σε όλες τις απαραίτητες πληροφορίες, καθιστώντας την εμπειρία τους πιο άνετη και άμεση.']}},{id:'NFC',icon:'star',price:'25€',priceNote:'εφάπαξ',title:'Ανέπαφη Βάση Αξιολογήσεων',shortDesc:'50+ νέες αξιολογήσεις κάθε μήνα. Ανεβείτε στην κορυφή της Google σε 3 μήνες.',features:['Αύξηση κριτικών Google','Βελτίωση τοπικού SEO','Εύκολη χρήση (NFC)','Χωρίς μηνιαία συνδρομή'],cta:'Αγορά Τώρα',more:'Περισσότερες πληροφορίες',modal:{title:'Ανέπαφη Βάση Αξιολογήσεων',image:'https://assets.cdn.filesafe.space/61icdoMiJ2pHklO6mmKW/media/6724bf7a4eb48eb705a7b389.gif',body:['Ανεβείτε στη κορυφή της Google και αποκτήστε 150 νέες αξιολογήσεις σε λιγότερο απο 3 μήνες.','Το πρώτο που κάνει κάποιος όταν αναζητεί μια επιχείρηση είναι να δει τις κριτικές της.','Αν έχετε ελάχιστες είναι πολύ πιθανό να χάσετε πελάτες από τον ανταγωνισμό.','Αλλά δεν είναι μόνο οι πελάτες που επηρεάζονται!','Η Google, ως μηχανή αναζήτησης, θέλει να παρέχει τα πιο στοχευμένα αλλά και έγκυρα αποτελέσματα δίνοντας έτσι κύρια σημασία στις αξιολογήσεις.','Όταν το ζητάτε από τους πελάτες σας συνήθως το ξεχνάνε ή δεν επενδύουν τον χρόνο να ψάξουν.','Με την ανέπαφη βάση αξιολογήσεων μας μπορείτε να αποκτάτε τούλαχιστον 50 νέες κριτικές κάθε μήνα έυκολα και γρήγορα!','Υπολογίστε και μόνοι σας (πχ 8 πελάτες ανά ημέρα, 20 εργάσιμες = 160 πελάτες τον μήνα. Αν λιγότεροι από τους μισόυς, οι 50, σας αφήσουν μια αξιολόγηση, έχετε 150 νέες σε 3 μήνες).']}},{id:'SOCIAL',icon:'instagram',price:'87€/μήνα',title:'Διαχείριση Social Media',shortDesc:'Επαγγελματικά posts, hashtag research, copywriting. 7 ημέρες δωρεάν δοκιμή.',features:['3 posts/εβδομάδα','Hashtag research','Copywriting','Μηνιαία αναφορά'],cta:'Δωρεάν Δοκιμή',more:'Περισσότερες πληροφορίες',modal:{title:'ΕΠΑΓΓΕΛΜΑΤΙΚΗ ΔΙΑΧΕΙΡΙΣΗ SOCIAL MEDIA',body:['• Επαγγελματικά Επεξεργασμένα Posts ανά ημέρα : Δημοσιεύουμε αναρτήσεις που τραβούν την προσοχή των πελατών σας, χρησιμοποιώντας προγράμματα επεξεργασίας συνδυαστικής αξίας 300+ευρώ τον μήνα, όπως Adscreative.io, Photoroom, Photoshop, Adobe Premium, Canvas Pro, Picsart Pro και άλλα.','• Έρευνα Hashtags: Χρησιμοποιούμε τα καλύτερα hashtags ανάλογα με την επιχείρηση, τις υπηρεσίες, το κοινό και την τοποθεσία για να ενισχύσουμε την απήχησή σας και να σας φέρουμε μπροστά σε νέο κοινό.','• Επαγγελματική Κειμενογραφία για κάθε ανάρτηση που οδηγούν τον αναγνώστη σε μια επιθυμητή ενέργεια (πχ να κλείσει ραντεβού κλπ)','• Επεξεργασία - Δημιουργία επαγγελματικού βιογραφικού για το προφιλ σας','• Αναφορές Προόδου: Παρέχουμε μηνιαία ανάλυση της ανάπτυξης των ακολούθων και της αλληλεπίδρασης με τις δημοσιεύσεις σας.','• Ευκολία & Άνεση: Το μόνο που χρειάζεται να κάνετε είναι να μας στείλετε φωτογραφίες της επιχείρησής σας μέσω WeTransfer, και εμείς θα αναλάβουμε τα υπόλοιπα. Αν δεν έχετε μπορούμε να δημιουργούμε εμείς δικά μας designs, χωρίς καμία επένδυση χρόνου από εσάς!','Δωρεάν Δοκιμή','No contracts - cancel anytime','----','Γιατί να Μας Επιλέξετε:','Οικονομικό πακέτο & Χωρίς Ρίσκο: Με μόνο 87 ευρώ τον μήνα και εγγύηση επιστροφής χρημάτων, αφαιρούμε κάθε ρίσκο από την απόφασή σας. Αν δεν είστε απόλυτα ικανοποιημένοι, σας επιστρέφουμε τα χρήματά σας – χωρίς ερωτήσεις.','Προσωποποιημένη Υπηρεσία: Προσαρμόζουμε το περιεχόμενο σύμφωνα με τις ανάγκες της επιχείρησής σας, ώστε να αντανακλά την ταυτότητα και το στυλ σας.','Άμεση Έναρξη: Κλείστε τη θέση σας τώρα – διαθέτουμε μόνο λίγες θέσεις για νέους πελάτες κάθε μήνα, ώστε να διατηρήσουμε την ποιότητα της υπηρεσίας μας.','Καμία Δέσμευση: Μπορείτε να σταματήσετε οποιαδήποτε στιγμή χωρίς μακροχρόνια συμβόλαια.','Αποτέλεσμα: Περισσότεροι Πελάτες & Επαγγελματική Παρουσία','Με τη σωστή διαχείριση του Instagram, θα δείτε αυξημένη αλληλεπίδραση, μεγαλύτερη βάση πελατών, και ένα προφίλ που προσελκύει την προσοχή και δημιουργεί εμπιστοσύνη.','Εγγραφείτε σήμερα και εξασφαλίστε την ειδική τιμή των 87€ μήνα.','Στείλτε μας email στο angelos@advonmedia.com για περαιτέρω επικοινωνία. (το ελέγχουμε καθημερινά)']}}],en:[{id:'WEBSITE',icon:'globe',price:'FREE',priceNote:'(only 10.83€/mo hosting)',title:'Website Creation',shortDesc:'Professional website that ranks high on Google.',features:['Pro Design','SEO Optimized','Mobile Responsive','5-10 Days Delivery'],cta:'Get Started Free',more:'Learn More',modal:{title:'Free Website Creation',body:["It's not a marketing trick, the creation that normally costs 700-2000€+, is completely free.","The only cost we can't cover is the hosting and domain name (e.g. www.example.com). We handle the process for you!","We do this to build our portfolio so we can charge higher rates in the future.","It's only 10.83€/month total (which you'd pay anywhere else anyway, just like everyone who has a website).","Upgrade your online presence and turn visitors into loyal clients!","In 2025, having a professional website is not just an extra tool - it's a necessity for every freelancer and business that wants to stand out in the digital world.","A well-designed website helps you achieve higher positions in search engines, as Google evaluates websites as more reliable and with a more complete profile.","Your website acts as your digital storefront, enhancing your professional image and promoting your business as serious and reliable to visitors. Furthermore, it offers users easy access to all necessary information, making their experience more comfortable and immediate."]}},{id:'NFC',icon:'star',price:'25€',priceNote:'one-time',title:'Contactless Review Stand',shortDesc:'50+ new reviews monthly. Reach the top of Google in 3 months.',features:['Increase Google Reviews','Improve Local SEO','Easy to use (NFC)','No monthly fee'],cta:'Buy Now',more:'Learn More',modal:{title:'Contactless Review Stand',image:'https://assets.cdn.filesafe.space/61icdoMiJ2pHklO6mmKW/media/6724bf7a4eb48eb705a7b389.gif',body:['Reach the top of Google and get 150 new reviews in less than 3 months.','The first thing people do when searching for a business is check its reviews.','If you have very few, it is very likely you will lose customers to the competition.','But it is not only customers who are affected!','Google, as a search engine, wants to provide the most targeted and valid results, thus giving primary importance to reviews.','When you ask your customers, they usually forget or do not invest the time to search.','With our contactless review base, you can get at least 50 new reviews every month easily and quickly!','Calculate for yourself (e.g., 8 customers per day, 20 working days = 160 customers a month. If fewer than half, 50, leave a review, you have 150 new ones in 3 months).']}},{id:'SOCIAL',icon:'instagram',price:'87€/mo',title:'Social Media Management',shortDesc:'Professional posts, hashtag research, copywriting. 7-day free trial.',features:['3 posts/week','Hashtag research','Copywriting','Monthly Report'],cta:'Free Trial',more:'Learn More',modal:{title:'PROFESSIONAL SOCIAL MEDIA MANAGEMENT',body:['• Professionally Edited Posts per day: We publish posts that catch your customers\' attention, using editing programs with a combined value of 300+ euros per month, such as Adscreative.io, Photoroom, Photoshop, Adobe Premium, Canvas Pro, Picsart Pro, and more.','• Hashtag Research: We use the best hashtags depending on the business, services, audience, and location to boost your reach and get you in front of new audiences.','• Professional Copywriting for every post that leads the reader to a desired action (e.g., booking an appointment, etc.)','• Editing - Creation of a professional bio for your profile','• Progress Reports: We provide a monthly analysis of follower growth and interaction with your posts.','• Ease & Comfort: All you need to do is send us photos of your business via WeTransfer, and we will take care of the rest. If you don\'t have any, we can create our own designs, without any time investment from you!','Free Trial','No contracts - cancel anytime','----','Why Choose Us:','Economical Package & Risk-Free: For only 87 euros per month and a money-back guarantee, we remove all risk from your decision. If you are not completely satisfied, we return your money - no questions asked.','Personalized Service: We tailor the content according to the needs of your business, so it reflects your identity and style.','Immediate Start: Book your spot now - we only have a few spots for new clients each month to maintain the quality of our service.','No Commitment: You can stop at any time without long-term contracts.','Result: More Customers & Professional Presence','With proper Instagram management, you will see increased interaction, a larger customer base, and a profile that attracts attention and builds trust.','Sign up today and secure the special price of 87€/month.','Send us an email at angelos@advonmedia.com for further communication. (we check it daily)']}}]};

//  ROLLS-ROYCE STARLIGHT CEILING
// ═══════════════════════════════════════════════════════════════
const slC=document.getElementById('starlight-canvas'),slX=slC.getContext('2d');
let stars=[],shooters=[];
function initStars(){slC.width=innerWidth;slC.height=innerHeight;stars=[];const c=Math.min(Math.floor(innerWidth*innerHeight/2500),500);for(let i=0;i<c;i++)stars.push({x:Math.random()*slC.width,y:Math.random()*slC.height,s:Math.random()*1.8+0.2,o:Math.random(),sp:Math.random()*0.015+0.003,d:1,c:Math.random()>0.85?'gold':'cyan'});}
function drawStars(t){slX.clearRect(0,0,slC.width,slC.height);stars.forEach(s=>{s.o+=s.sp*s.d;if(s.o>1||s.o<0.15)s.d*=-1;const a=Math.abs(s.o)*0.7;const col=s.c==='gold'?`rgba(201,168,76,${a})`:`rgba(71,200,245,${a*0.5})`;slX.fillStyle=col;slX.beginPath();slX.arc(s.x,s.y,s.s,0,Math.PI*2);slX.fill();if(s.s>1.2){slX.fillStyle=s.c==='gold'?`rgba(201,168,76,${a*0.15})`:`rgba(71,200,245,${a*0.08})`;slX.beginPath();slX.arc(s.x,s.y,s.s*3,0,Math.PI*2);slX.fill();}});if(Math.random()<0.008)shooters.push({x:Math.random()*slC.width,y:Math.random()*slC.height/3,l:Math.random()*80+40,sp:Math.random()*15+12,a:Math.PI/4+(Math.random()-0.5)*0.3,o:1});for(let i=shooters.length-1;i>=0;i--){const s=shooters[i];s.x+=Math.cos(s.a)*s.sp;s.y+=Math.sin(s.a)*s.sp;s.o-=0.015;if(s.o<=0||s.x>slC.width||s.y>slC.height){shooters.splice(i,1);continue;}const g=slX.createLinearGradient(s.x,s.y,s.x-Math.cos(s.a)*s.l,s.y-Math.sin(s.a)*s.l);g.addColorStop(0,`rgba(201,168,76,${s.o})`);g.addColorStop(1,'rgba(201,168,76,0)');slX.strokeStyle=g;slX.lineWidth=1.5;slX.beginPath();slX.moveTo(s.x,s.y);slX.lineTo(s.x-Math.cos(s.a)*s.l,s.y-Math.sin(s.a)*s.l);slX.stroke();}requestAnimationFrame(drawStars);}
addEventListener('resize',initStars);initStars();requestAnimationFrame(drawStars);

function initMag(){document.querySelectorAll('.mag-btn').forEach(b=>{b.addEventListener('mousemove',e=>{const r=b.getBoundingClientRect(),x=e.clientX-r.left-r.width/2,y=e.clientY-r.top-r.height/2;b.style.transform=`translate(${x*0.15}px,${y*0.15}px)`;});b.addEventListener('mouseleave',()=>{b.style.transform='';});});}

// ═══════════════════════════════════════════════════════════════
//  3D TILT
// ═══════════════════════════════════════════════════════════════
function init3D(){document.querySelectorAll('.tilt-3d').forEach(c=>{c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-0.5,y=(e.clientY-r.top)/r.height-0.5;c.style.transform=`perspective(800px) rotateY(${x*7}deg) rotateX(${-y*7}deg) scale3d(1.01,1.01,1.01)`;});c.addEventListener('mouseleave',()=>{c.style.transform='';c.style.transition='transform 0.7s cubic-bezier(.22,1,.36,1)';});c.addEventListener('mouseenter',()=>{c.style.transition='none';});});}

// ═══════════════════════════════════════════════════════════════
//  MOBILE MENU

window.closeMob=()=>{document.getElementById('mob-menu').classList.remove('open');};
document.getElementById('mob-btn').addEventListener('click',()=>{document.getElementById('mob-menu').classList.toggle('open');});

// ═══════════════════════════════════════════════════════════════
//  PORTFOLIO PAGINATION
// ═══════════════════════════════════════════════════════════════
let cPage=0;const ipp=21;
function renderPort(){
const t=translations[currentLang],tp=Math.ceil(portfolioItems.length/ipp),st=cPage*ipp,items=portfolioItems.slice(st,st+ipp);
const g=document.getElementById('portfolio-grid');
g.innerHTML=items.map((it,i)=>{const dn=(currentLang==='en'&&it.nameEn)?it.nameEn:it.name;return`
<a href="${it.url}" target="_blank" rel="noopener noreferrer" class="rv port-card tilt-3d aspect-[4/3] block vis" style="transition-delay:${Math.min(i*25,250)}ms">
  <img src="${it.image}" alt="${dn}" class="w-full h-full object-cover" loading="lazy">
  <div class="port-overlay">
    <h3 class="text-[13px] font-display font-semibold text-white leading-snug mb-2">${dn}</h3>
    <span class="inline-flex items-center gap-2 text-[9px] font-mono text-[var(--gold)] uppercase tracking-[0.2em]">${elUpper(t.sectionTitles.viewSite)} <i data-lucide="external-link" class="w-2.5 h-2.5"></i></span>
  </div>
</a>`;}).join('');
const pb=document.getElementById('prev-btn'),nb=document.getElementById('next-btn');
pb.disabled=cPage===0;nb.disabled=cPage===tp-1;
pb.onclick=()=>{if(cPage>0){cPage--;renderPort();lucide.createIcons();obsRv();init3D();document.getElementById('portfolio').scrollIntoView({behavior:'smooth'});}};
nb.onclick=()=>{if(cPage<tp-1){cPage++;renderPort();lucide.createIcons();obsRv();init3D();document.getElementById('portfolio').scrollIntoView({behavior:'smooth'});}};
document.getElementById('pg-dots').innerHTML=Array.from({length:tp}).map((_,i)=>`<div class="pg-dot ${i===cPage?'active':''}"></div>`).join('');
lucide.createIcons();obsRv();init3D();
}

// ═══════════════════════════════════════════════════════════════
//  FAQ
// ═══════════════════════════════════════════════════════════════
window.togFaq=function(b){const c=b.nextElementSibling,o=b.classList.contains('open');document.querySelectorAll('.faq-btn').forEach(x=>{x.classList.remove('open');x.nextElementSibling.style.maxHeight='0';});if(!o){b.classList.add('open');c.style.maxHeight=c.scrollHeight+'px';}};

// ═══════════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════════
const mO=document.getElementById('modal-overlay'),mB=document.getElementById('modal-bg'),mC=document.getElementById('modal-box');
window.openModal=function(id){const d=services[currentLang].find(s=>s.id===id);if(!d)return;document.getElementById('m-title').innerText=d.modal.title;const ic=document.getElementById('m-img');if(d.modal.image){ic.innerHTML=`<img src="${d.modal.image}" class="w-full h-auto rounded-xl border border-white/8" alt="${d.modal.title}">`;ic.classList.remove('hidden');}else{ic.classList.add('hidden');}document.getElementById('m-body').innerHTML=d.modal.body.map(p=>`<p class="${p.startsWith('•')?'pl-5 border-l border-[var(--gold)]/15 text-white/60':''} mb-1">${p}</p>`).join('');mO.classList.remove('hidden');mO.classList.add('flex');setTimeout(()=>{mB.classList.remove('opacity-0');mC.classList.remove('opacity-0','scale-95');mC.classList.add('opacity-100','scale-100');},10);document.body.classList.add('modal-open');};
window.closeModal=function(){mB.classList.add('opacity-0');mC.classList.remove('opacity-100','scale-100');mC.classList.add('opacity-0','scale-95');setTimeout(()=>{mO.classList.add('hidden');mO.classList.remove('flex');document.body.classList.remove('modal-open');},500);};
mB.addEventListener('click',closeModal);

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
renderApp();
</script>
