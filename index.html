<!DOCTYPE html>
<html lang="el" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advon Media | Ψηφιακές Λύσεις Marketing</title>
    <meta name="description" content="Οι πιο αποτελεσματικές λύσεις marketing για τοπικές επιχειρήσεις." />
    <link rel="icon" href="https://assets.cdn.filesafe.space/NkFUgZER3rrdnofCwAIl/media/648dd017a1f733fa5b51e5e9.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Outfit:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{display:['Cormorant Garamond','serif'],body:['Outfit','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Trafft Booking -->
    <script type="text/javascript" src="https://advonmedia.trafft.com/embed.js" async></script>
    <style>
      :root{--cyan:#47c8f5;--cyan-soft:rgba(71,200,245,0.12);--gold:#c9a84c;--gold-soft:rgba(201,168,76,0.15);--void:#020405;--deep:#060a0d;}
      *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
      ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--void)}::-webkit-scrollbar-thumb{background:rgba(71,200,245,0.2);border-radius:10px}
      ::selection{background:rgba(71,200,245,0.2);color:#fff}
      html{scroll-behavior:smooth}
      body{background:var(--void);color:#e0e4e7;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-family:'Outfit',sans-serif}
      body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:10000;opacity:0.5}

      #starlight-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

      /* ═══ CENTRAL LASER BEAM ═══ */
      .laser-central{position:fixed;left:50%;top:0;transform:translateX(-50%);width:3px;height:100vh;z-index:1;pointer-events:none;background:linear-gradient(180deg,transparent 0%,rgba(71,200,245,0.05) 5%,rgba(71,200,245,0.2) 20%,rgba(71,200,245,0.5) 50%,rgba(71,200,245,0.2) 80%,rgba(71,200,245,0.05) 95%,transparent 100%);animation:laser-pulse 4s ease-in-out infinite;box-shadow:0 0 20px rgba(71,200,245,0.15),0 0 60px rgba(71,200,245,0.08),0 0 120px rgba(71,200,245,0.03)}
      .laser-central::before{content:'';position:absolute;left:-20px;top:0;width:43px;height:100%;background:linear-gradient(180deg,transparent,rgba(71,200,245,0.02) 30%,rgba(71,200,245,0.04) 50%,rgba(71,200,245,0.02) 70%,transparent);filter:blur(10px)}
      .laser-central::after{content:'';position:absolute;left:-40px;top:0;width:83px;height:100%;background:linear-gradient(180deg,transparent,rgba(71,200,245,0.008) 30%,rgba(71,200,245,0.015) 50%,rgba(71,200,245,0.008) 70%,transparent);filter:blur(25px)}
      @keyframes laser-pulse{0%,100%{opacity:.5}50%{opacity:1}}

      /* Side beams */
      .laser-side{position:fixed;top:0;width:1px;height:100vh;z-index:1;pointer-events:none;opacity:0.25}
      .laser-side:nth-child(2){left:25%;background:linear-gradient(180deg,transparent,rgba(71,200,245,0.1) 50%,transparent);animation:laser-pulse 6s ease-in-out infinite}
      .laser-side:nth-child(3){left:75%;background:linear-gradient(180deg,transparent,rgba(71,200,245,0.1) 50%,transparent);animation:laser-pulse 8s ease-in-out infinite 2s}

      /* Sweep */
      .laser-sweep{position:fixed;width:100%;height:1px;left:0;z-index:1;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(71,200,245,0.2),rgba(71,200,245,0.5),rgba(71,200,245,0.2),transparent);animation:sweep-down 18s linear infinite;filter:blur(0.5px);box-shadow:0 0 20px rgba(71,200,245,0.1)}
      @keyframes sweep-down{0%{top:-2%;opacity:0}5%{opacity:1}95%{opacity:1}100%{top:102%;opacity:0}}

      /* ═══ CURSOR ═══ */
      .cur-d{position:fixed;width:10px;height:10px;border:1px solid var(--cyan);transform:translate(-50%,-50%) rotate(45deg);pointer-events:none;z-index:99999;transition:width .4s cubic-bezier(.22,1,.36,1),height .4s cubic-bezier(.22,1,.36,1),border-color .3s,background .3s}
      .cur-d.hov{width:40px;height:40px;background:rgba(71,200,245,0.06);border-color:var(--gold)}
      .cur-a{position:fixed;width:200px;height:200px;background:radial-gradient(circle,rgba(71,200,245,0.04) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
      @media(hover:none){.cur-d,.cur-a{display:none!important}}

      /* ═══ REVEALS ═══ */
      .rv{opacity:0;transform:translateY(50px);transition:opacity 1.1s cubic-bezier(.16,1,.3,1),transform 1.1s cubic-bezier(.16,1,.3,1)}
      .rv.vis{opacity:1;transform:translateY(0)}
      .rv-scale{opacity:0;transform:scale(0.9);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1)}
      .rv-scale.vis{opacity:1;transform:scale(1)}

      /* ═══ SHIMMER ═══ */
      .lux-shimmer{background:linear-gradient(90deg,var(--cyan),#fff,var(--gold),var(--cyan));background-size:400% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:lux-shine 8s ease-in-out infinite}
      @keyframes lux-shine{0%{background-position:100% 50%}50%{background-position:0% 50%}100%{background-position:100% 50%}}

      .section-line{height:1px;background:linear-gradient(90deg,transparent,rgba(71,200,245,0.12),rgba(201,168,76,0.08),rgba(71,200,245,0.12),transparent)}

      /* ═══ GLASS ═══ */
      .lux-glass{background:rgba(6,10,13,0.7);backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);border:1px solid rgba(71,200,245,0.06);transition:border-color .6s,box-shadow .6s,transform .6s cubic-bezier(.22,1,.36,1)}
      .lux-glass:hover{border-color:rgba(71,200,245,0.15);box-shadow:0 0 60px rgba(71,200,245,0.04),inset 0 0 30px rgba(71,200,245,0.02)}

      /* ═══ PORTFOLIO ═══ */
      .port-card{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.03);border-radius:12px;transition:border-color .6s,transform .6s cubic-bezier(.22,1,.36,1);will-change:transform}
      .port-card:hover{border-color:rgba(71,200,245,0.12)}
      .port-card img{transition:transform 1.4s cubic-bezier(.22,1,.36,1),filter 1s;will-change:transform}
      .port-card:hover img{transform:scale(1.06);filter:brightness(0.5)}
      .port-card .port-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(2,4,5,0.97) 0%,rgba(2,4,5,0.5) 35%,transparent);opacity:0;transition:opacity .6s;display:flex;flex-direction:column;justify-content:flex-end;padding:20px}
      .port-card:hover .port-ov{opacity:1}
      .port-card .port-ov>*{transform:translateY(12px);opacity:0;transition:transform .5s cubic-bezier(.22,1,.36,1) .05s,opacity .4s .05s}
      .port-card:hover .port-ov>*{transform:translateY(0);opacity:1}

      /* ═══ REVIEW ═══ */
      .rev-card{position:relative}.rev-card::before{content:'"';position:absolute;top:12px;right:20px;font-family:'Cormorant Garamond',serif;font-size:100px;line-height:1;color:rgba(201,168,76,0.04);pointer-events:none}

      /* ═══ FAQ ═══ */
      .faq-row{border-bottom:1px solid rgba(255,255,255,0.03)}.faq-row:hover{background:rgba(71,200,245,0.015)}
      .faq-btn svg{transition:transform .5s cubic-bezier(.22,1,.36,1)}.faq-btn.open svg{transform:rotate(45deg)}
      .faq-body{max-height:0;overflow:hidden;transition:max-height .6s cubic-bezier(.22,1,.36,1)}

      .hdr-scroll{background:rgba(2,4,5,0.9)!important;border-bottom-color:rgba(71,200,245,0.06)!important;box-shadow:0 2px 40px rgba(0,0,0,0.6)}
      .nav-a{position:relative}.nav-a::after{content:'';position:absolute;bottom:-2px;left:0;width:100%;height:1px;background:linear-gradient(90deg,var(--cyan),var(--gold));transform:scaleX(0);transform-origin:right;transition:transform .5s cubic-bezier(.22,1,.36,1)}.nav-a:hover::after{transform:scaleX(1);transform-origin:left}
      .mag-btn{transition:transform .3s cubic-bezier(.22,1,.36,1)}
      .cta-shine{position:relative;overflow:hidden}.cta-shine::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);transition:left .7s ease}.cta-shine:hover::before{left:100%}

      .lux-label{display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);padding:6px 18px;border:1px solid rgba(201,168,76,0.2);border-radius:100px;background:rgba(201,168,76,0.04)}
      .lux-label .pdot{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:pdot 2.5s ease-in-out infinite}
      @keyframes pdot{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}

      .pg-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.1);transition:all .5s cubic-bezier(.22,1,.36,1)}
      .pg-dot.active{width:28px;border-radius:3px;background:linear-gradient(90deg,var(--cyan),var(--gold));box-shadow:0 0 12px rgba(71,200,245,0.3)}

      .tilt-3d{will-change:transform;transform-style:preserve-3d}
      .hero-in{opacity:0;transform:translateY(25px);animation:h-enter 1.2s cubic-bezier(.16,1,.3,1) forwards}
      .hero-in:nth-child(1){animation-delay:.2s}.hero-in:nth-child(2){animation-delay:.45s}.hero-in:nth-child(3){animation-delay:.7s}.hero-in:nth-child(4){animation-delay:.95s}.hero-in:nth-child(5){animation-delay:1.15s}
      @keyframes h-enter{to{opacity:1;transform:translateY(0)}}
      .mob-panel{max-height:0;overflow:hidden;transition:max-height .6s cubic-bezier(.22,1,.36,1)}.mob-panel.open{max-height:400px}
      main{transition:opacity .5s cubic-bezier(.4,0,.2,1)}.modal-open{overflow:hidden}

      /* ═══ STATS ENHANCED ═══ */
      .stat-card{position:relative;text-align:center;padding:28px 20px;border-radius:16px;background:rgba(71,200,245,0.02);border:1px solid rgba(71,200,245,0.04);transition:all .5s cubic-bezier(.22,1,.36,1);overflow:hidden}
      .stat-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(71,200,245,0.06),transparent 70%);opacity:0;transition:opacity .5s}
      .stat-card:hover{border-color:rgba(71,200,245,0.12);transform:translateY(-4px)}.stat-card:hover::before{opacity:1}
      .stat-num{font-size:clamp(2.5rem,5vw,3.5rem);font-family:'Cormorant Garamond',serif;font-weight:600;background:linear-gradient(135deg,var(--cyan),#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;margin-bottom:6px}
      .stat-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(201,168,76,0.5)}

      /* ═══ FORM ═══ */
      .form-input{width:100%;padding:14px 18px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;color:#fff;font-family:'Outfit',sans-serif;font-size:14px;transition:border-color .3s,box-shadow .3s;outline:none}
      .form-input:focus{border-color:rgba(71,200,245,0.3);box-shadow:0 0 20px rgba(71,200,245,0.05)}
      .form-input::placeholder{color:rgba(255,255,255,0.2)}
      textarea.form-input{min-height:120px;resize:vertical}

      /* ═══ BOOKING MODAL ═══ */
      .booking-overlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
      .booking-overlay.open{display:flex}
      .booking-bg{position:absolute;inset:0;background:rgba(2,4,5,0.92);backdrop-filter:blur(12px)}
      .booking-box{position:relative;width:100%;max-width:800px;height:85vh;border-radius:16px;overflow:hidden;border:1px solid rgba(71,200,245,0.1);background:var(--deep)}

      /* ═══ IG ICON INLINE ═══ */
      .ig-icon{display:inline-block;width:1em;height:1em;vertical-align:middle}
    </style>
</head>
<body class="antialiased">

<div class="cur-d" id="cur-d"></div>
<div class="cur-a" id="cur-a"></div>
<canvas id="starlight-canvas"></canvas>

<!-- Laser System -->
<div class="laser-central"></div>
<div class="laser-side"></div>
<div class="laser-side"></div>
<div class="laser-sweep"></div>

<!-- Header -->
<header class="fixed top-0 left-0 right-0 z-50 border-b border-transparent transition-all duration-500" id="main-header">
  <div class="max-w-7xl mx-auto px-6 lg:px-8 h-20 flex items-center justify-between">
    <a href="#" class="flex items-center gap-3 group"><img src="https://assets.cdn.filesafe.space/NkFUgZER3rrdnofCwAIl/media/648dd017a1f733fa5b51e5e9.png" alt="Advon Media" class="h-9 w-auto opacity-80 group-hover:opacity-100 transition-opacity" style="filter:drop-shadow(0 0 12px rgba(71,200,245,0.3))"></a>
    <nav id="desktop-nav" class="hidden md:flex items-center gap-9 text-[13px] font-medium tracking-wide"></nav>

      <button onclick="triggerLanguageSwitch()" id="lang-btn" class="hidden md:flex items-center gap-2 px-4 py-2 rounded-full bg-white/3 border border-white/8 text-[11px] font-bold text-white/50 hover:border-cyan-400/30 hover:text-cyan-400 transition-all cursor-pointer mag-btn"></button>
      <button class="md:hidden text-white/40 p-2 hover:text-cyan-400 transition-colors" id="mob-btn"><i data-lucide="menu" class="w-5 h-5"></i></button>

<main class="relative z-10" id="main-content">

  <!-- HERO -->
  <section class="relative min-h-screen flex items-center justify-center pt-20 pb-24 overflow-hidden">

      <!-- Enhanced Cyan Shadows -->
      <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] rounded-full" style="background:radial-gradient(circle,rgba(71,200,245,0.04) 0%,rgba(71,200,245,0.015) 30%,transparent 60%)"></div>
      <div class="absolute top-1/3 left-1/3 w-[400px] h-[400px] rounded-full" style="background:radial-gradient(circle,rgba(71,200,245,0.03),transparent 70%)"></div>
      <div class="absolute top-1/3 right-1/4 w-[300px] h-[300px] rounded-full" style="background:radial-gradient(circle,rgba(71,200,245,0.025),transparent 70%)"></div>
      <div class="absolute bottom-1/4 left-1/2 -translate-x-1/2 w-[600px] h-[200px] rounded-full" style="background:radial-gradient(ellipse,rgba(71,200,245,0.02),transparent 70%)"></div>
      <div class="absolute bottom-0 left-0 right-0 section-line"></div>
    </div>
    <div class="container max-w-6xl mx-auto px-6 lg:px-8 text-center relative z-10" id="hero-content"></div>
  </section>

  <!-- STATS -->
  <section class="py-20 relative z-10"><div class="max-w-5xl mx-auto px-6 lg:px-8" id="stats-grid"></div></section>

  <!-- SERVICES -->
  <section id="services" class="py-32 relative">
    <div class="section-line"></div>
    <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10 pt-16">
      <div id="services-header" class="mb-20"></div>
      <div class="grid md:grid-cols-3 gap-6" id="services-grid"></div>
      <div id="services-footer" class="mt-16 text-center"></div>
    </div>
  </section>

  <!-- PORTFOLIO -->
  <section id="portfolio" class="py-32 relative">
    <div class="section-line"></div>
    <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10 pt-16">
      <div id="portfolio-header" class="mb-20"></div>
      <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mb-12 min-h-[400px]"></div>

        <div id="pg-dots" class="flex gap-2 items-center"></div>
        <button id="next-btn" class="p-2.5 rounded-full border border-white/8 bg-white/3 text-white/40 hover:border-cyan-400/30 hover:text-cyan-400 transition-all disabled:opacity-15 disabled:cursor-not-allowed mag-btn"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
      </div>
    </div>
  </section>

  <!-- REVIEWS -->
  <section id="reviews" class="py-32 relative overflow-hidden">
    <div class="section-line"></div>
    <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10 pt-16">
      <div id="reviews-header" class="mb-20"></div>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5 mb-16" id="reviews-grid"></div>
      <div id="reviews-footer" class="text-center"></div>
    </div>

  <!-- FAQ -->
  <section id="faq" class="py-24 relative">
    <div class="section-line"></div>
    <div class="max-w-3xl mx-auto px-6 lg:px-8 relative z-10 pt-16">
      <div id="faq-header" class="mb-12"></div>
      <div id="faq-container"></div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="py-32 relative">

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[300px] rounded-full pointer-events-none" style="background:radial-gradient(circle,rgba(71,200,245,0.02),transparent 60%)"></div>
    <div class="max-w-5xl mx-auto px-6 lg:px-8 relative z-10 pt-16" id="contact-container"></div>

<footer class="py-10 border-t border-white/4 relative z-20">
  <div class="max-w-7xl mx-auto px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6" id="footer-content"></div>
</footer>

<!-- Modal -->
<div id="modal-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">

  </div>
</div>

<script>
let currentLang='el';
const DA='https://ui-avatars.com/api/?background=0D8ABC&color=fff&name=';

// ═══ STARLIGHT ═══
const slC=document.getElementById('starlight-canvas'),slX=slC.getContext('2d');let stars=[],shooters=[];
function initStars(){slC.width=innerWidth;slC.height=innerHeight;stars=[];const c=Math.min(Math.floor(innerWidth*innerHeight/2500),500);for(let i=0;i<c;i++)stars.push({x:Math.random()*slC.width,y:Math.random()*slC.height,s:Math.random()*1.8+0.2,o:Math.random(),sp:Math.random()*0.015+0.003,d:1,c:Math.random()>0.85?'gold':'cyan'});}
function drawStars(t){slX.clearRect(0,0,slC.width,slC.height);stars.forEach(s=>{s.o+=s.sp*s.d;if(s.o>1||s.o<0.15)s.d*=-1;const a=Math.abs(s.o)*0.7;slX.fillStyle=s.c==='gold'?`rgba(201,168,76,${a})`:`rgba(71,200,245,${a*0.5})`;slX.beginPath();slX.arc(s.x,s.y,s.s,0,Math.PI*2);slX.fill();if(s.s>1.2){slX.fillStyle=s.c==='gold'?`rgba(201,168,76,${a*0.15})`:`rgba(71,200,245,${a*0.08})`;slX.beginPath();slX.arc(s.x,s.y,s.s*3,0,Math.PI*2);slX.fill();}});if(Math.random()<0.008)shooters.push({x:Math.random()*slC.width,y:Math.random()*slC.height/3,l:Math.random()*80+40,sp:Math.random()*15+12,a:Math.PI/4+(Math.random()-0.5)*0.3,o:1});for(let i=shooters.length-1;i>=0;i--){const s=shooters[i];s.x+=Math.cos(s.a)*s.sp;s.y+=Math.sin(s.a)*s.sp;s.o-=0.015;if(s.o<=0){shooters.splice(i,1);continue;}const g=slX.createLinearGradient(s.x,s.y,s.x-Math.cos(s.a)*s.l,s.y-Math.sin(s.a)*s.l);g.addColorStop(0,`rgba(201,168,76,${s.o})`);g.addColorStop(1,'rgba(201,168,76,0)');slX.strokeStyle=g;slX.lineWidth=1.5;slX.beginPath();slX.moveTo(s.x,s.y);slX.lineTo(s.x-Math.cos(s.a)*s.l,s.y-Math.sin(s.a)*s.l);slX.stroke();}requestAnimationFrame(drawStars);}
addEventListener('resize',initStars);initStars();requestAnimationFrame(drawStars);

function aniCur(){ax+=(mx-ax)*0.06;ay+=(my-ay)*0.06;cD.style.transform=`translate(${mx-5}px,${my-5}px) rotate(45deg)`;cA.style.transform=`translate(${ax-100}px,${ay-100}px)`;requestAnimationFrame(aniCur);}aniCur();

function initMag(){document.querySelectorAll('.mag-btn').forEach(b=>{b.addEventListener('mousemove',e=>{const r=b.getBoundingClientRect(),x=e.clientX-r.left-r.width/2,y=e.clientY-r.top-r.height/2;b.style.transform=`translate(${x*0.15}px,${y*0.15}px)`;});b.addEventListener('mouseleave',()=>{b.style.transform='';});});}
function init3D(){document.querySelectorAll('.tilt-3d').forEach(c=>{c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-0.5,y=(e.clientY-r.top)/r.height-0.5;c.style.transform=`perspective(800px) rotateY(${x*7}deg) rotateX(${-y*7}deg) scale3d(1.01,1.01,1.01)`;});c.addEventListener('mouseleave',()=>{c.style.transform='';c.style.transition='transform 0.7s cubic-bezier(.22,1,.36,1)';});c.addEventListener('mouseenter',()=>{c.style.transition='none';});});}
function obsRv(){const o=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:0.06,rootMargin:'0px 0px -30px 0px'});document.querySelectorAll('.rv,.rv-scale').forEach(el=>o.observe(el));}

document.getElementById('reviews-footer').innerHTML=`<div class="rv"><a href="https://share.google/zWUQyGTmywjaljaMW" target="_blank" rel="noopener noreferrer" class="mag-btn inline-flex items-center gap-3 px-8 py-4 border border-white/10 text-white/40 rounded-full hover:border-[var(--gold)]/30 hover:text-[var(--gold)] transition-all font-semibold text-sm uppercase tracking-[0.12em]"><span class="flex items-center gap-2">${elUpper(t.sectionTitles.viewAllReviews)} <i data-lucide="external-link" class="w-4 h-4"></i></span></a></div>`;

// FAQ
document.getElementById('faq-header').innerHTML=`<div class="rv text-center"><h2 class="text-4xl md:text-5xl font-display font-light text-white/90 italic">${t.sectionTitles.faq}</h2></div>`;
document.getElementById('faq-container').innerHTML=faqs[currentLang].map((f,i)=>`<div class="rv faq-row rounded-xl" style="transition-delay:${i*70}ms"><button onclick="togFaq(this)" class="faq-btn w-full flex items-center justify-between py-6 px-4 text-left font-display font-semibold text-white/70 hover:text-white transition-colors text-lg"><span class="italic">${f.question}</span><i data-lucide="plus" class="w-4 h-4 text-white/20 flex-shrink-0"></i></button><div class="faq-body px-4 text-white/35 leading-relaxed text-[15px] font-light"><div class="pb-6">${f.answer}</div></div></div>`).join('');

// Contact — Form + Email + Instagram + Book CTA
document.getElementById('contact-container').innerHTML=`
<div class="rv text-center"><div class="lux-label mb-6 inline-flex"><span class="pdot"></span>${elUpper(t.sectionTitles.contact)}</div></div>
<h2 class="rv text-5xl md:text-7xl font-display font-light mb-6 text-white/90 italic text-center">${t.sectionTitles.contactMain}</h2>
<p class="rv text-lg text-white/30 mb-12 font-light max-w-xl mx-auto text-center">${t.sectionTitles.contactSub}</p>

<!-- Book CTA -->
<div class="rv text-center mb-16">
  <button onclick="openBooking()" class="mag-btn cta-shine inline-flex items-center gap-3 px-10 py-5 rounded-full font-semibold text-sm uppercase tracking-[0.15em] transition-all border border-[var(--gold)]/30 text-[var(--gold)] hover:bg-[var(--gold)] hover:text-[var(--void)]" style="box-shadow:0 0 40px rgba(201,168,76,0.1)"><span class="flex items-center gap-2"><i data-lucide="calendar" class="w-5 h-5"></i> ${elUpper(t.sectionTitles.bookCall)}</span></button>
</div>

<div class="grid md:grid-cols-2 gap-8">
  <!-- Form -->
  <div class="rv lux-glass rounded-2xl p-8">
    <form action="https://formspree.io/f/xkopgoaj" method="POST" id="contact-form" class="space-y-4">
      <input type="text" name="name" placeholder="${t.sectionTitles.formName}" required class="form-input">
      <input type="email" name="email" placeholder="${t.sectionTitles.formEmail}" required class="form-input">
      <input type="tel" name="phone" placeholder="${t.sectionTitles.formPhone}" class="form-input">
      <textarea name="message" placeholder="${t.sectionTitles.formMsg}" required class="form-input"></textarea>
      <button type="submit" class="mag-btn cta-shine w-full py-4 rounded-xl font-semibold text-sm uppercase tracking-[0.15em] transition-all" style="background:linear-gradient(135deg,var(--cyan),#3ab8e0);color:var(--void);box-shadow:0 0 30px rgba(71,200,245,0.2)"><span class="flex items-center justify-center gap-2">${elUpper(t.sectionTitles.formSend)} <i data-lucide="send" class="w-4 h-4"></i></span></button>
      <p id="form-status" class="text-center text-sm text-[var(--gold)] hidden">${t.sectionTitles.formSuccess}</p>
    </form>
  </div>

  <!-- Contact Cards -->
  <div class="space-y-4">
    <a href="mailto:angelos@advonmedia.com" class="rv tilt-3d group lux-glass p-8 rounded-2xl flex items-center gap-5 transition-all hover:border-[var(--cyan)]/15">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center text-[var(--cyan)] group-hover:bg-[var(--cyan)] group-hover:text-[var(--void)] transition-all" style="background:var(--cyan-soft)"><i data-lucide="mail" class="w-5 h-5"></i></div>
      <div><h3 class="font-display font-semibold text-white/90 mb-1">Email</h3><p class="text-[var(--cyan)]/60 font-mono text-sm">angelos@advonmedia.com</p></div>
    </a>
    <a href="https://www.instagram.com/advon_media" target="_blank" rel="noopener noreferrer" class="rv tilt-3d group lux-glass p-8 rounded-2xl flex items-center gap-5 transition-all hover:border-[var(--cyan)]/15">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center text-[var(--cyan)] group-hover:bg-[var(--cyan)] group-hover:text-[var(--void)] transition-all" style="background:var(--cyan-soft)">${IG_SVG.replace('width="24"','width="20"').replace('height="24"','height="20"')}</div>
      <div><h3 class="font-display font-semibold text-white/90 mb-1">Instagram</h3><p class="text-[var(--cyan)]/60 font-mono text-sm">@advon_media</p></div>
    </a>
  </div>
</div>`;

// Form handler
setTimeout(()=>{const f=document.getElementById('contact-form');if(f)f.addEventListener('submit',async e=>{e.preventDefault();try{const r=await fetch(f.action,{method:'POST',body:new FormData(f),headers:{Accept:'application/json'}});if(r.ok){f.reset();document.getElementById('form-status').classList.remove('hidden');setTimeout(()=>document.getElementById('form-status').classList.add('hidden'),5000);}}catch(err){console.error(err);}});},100);

// Footer
document.getElementById('footer-content').innerHTML=`
<div class="flex items-center gap-4"><img src="https://assets.cdn.filesafe.space/NkFUgZER3rrdnofCwAIl/media/648dd017a1f733fa5b51e5e9.png" alt="Advon Media" class="h-6 w-auto opacity-30"><p class="text-[11px] text-white/15 font-mono tracking-wide">© 2026 Advon Media. ${t.footer.rights}</p></div>
<div class="flex gap-8 text-[11px] font-medium tracking-wider uppercase text-white/15"><a href="#services" class="hover:text-[var(--gold)] transition-colors">${elUpper(t.nav.services)}</a><a href="#portfolio" class="hover:text-[var(--gold)] transition-colors">${elUpper(t.nav.portfolio)}</a><a href="#contact" class="hover:text-[var(--gold)] transition-colors">${elUpper(t.nav.contact)}</a></div>`;

lucide.createIcons();obsRv();init3D();initMag();
}

// ═══ MOBILE ═══
window.closeMob=()=>{document.getElementById('mob-menu').classList.remove('open');};
document.getElementById('mob-btn').addEventListener('click',()=>{document.getElementById('mob-menu').classList.toggle('open');});

// ═══ PORTFOLIO ═══
let cPage=0;const ipp=21;
function renderPort(){
const t=translations[currentLang],tp=Math.ceil(portfolioItems.length/ipp),st=cPage*ipp,items=portfolioItems.slice(st,st+ipp);
document.getElementById('portfolio-grid').innerHTML=items.map((it,i)=>{const dn=(currentLang==='en'&&it.nameEn)?it.nameEn:it.name;return`
<a href="${it.url}" target="_blank" rel="noopener noreferrer" class="rv port-card tilt-3d aspect-[4/3] block vis" style="transition-delay:${Math.min(i*25,250)}ms">
  <img src="${it.image}" alt="${dn}" class="w-full h-full object-cover" loading="lazy">
  <div class="port-ov"><h3 class="text-[13px] font-display font-semibold text-white leading-snug mb-2">${dn}</h3><span class="inline-flex items-center gap-2 text-[9px] font-mono text-[var(--gold)] uppercase tracking-[0.2em]">${elUpper(t.sectionTitles.viewSite)} <i data-lucide="external-link" class="w-2.5 h-2.5"></i></span></div>
</a>`;}).join('');
const pb=document.getElementById('prev-btn'),nb=document.getElementById('next-btn');
pb.disabled=cPage===0;nb.disabled=cPage===tp-1;
pb.onclick=()=>{if(cPage>0){cPage--;renderPort();lucide.createIcons();obsRv();init3D();document.getElementById('portfolio').scrollIntoView({behavior:'smooth'});}};
nb.onclick=()=>{if(cPage<tp-1){cPage++;renderPort();lucide.createIcons();obsRv();init3D();document.getElementById('portfolio').scrollIntoView({behavior:'smooth'});}};
document.getElementById('pg-dots').innerHTML=Array.from({length:tp}).map((_,i)=>`<div class="pg-dot ${i===cPage?'active':''}"></div>`).join('');
lucide.createIcons();obsRv();init3D();}

// ═══ FAQ ═══
window.togFaq=function(b){const c=b.nextElementSibling,o=b.classList.contains('open');document.querySelectorAll('.faq-btn').forEach(x=>{x.classList.remove('open');x.nextElementSibling.style.maxHeight='0';});if(!o){b.classList.add('open');c.style.maxHeight=c.scrollHeight+'px';}};

// ═══ MODAL ═══
const mO=document.getElementById('modal-overlay'),mB=document.getElementById('modal-bg'),mC=document.getElementById('modal-box');
window.openModal=function(id){const d=services[currentLang].find(s=>s.id===id);if(!d)return;document.getElementById('m-title').innerText=d.modal.title;const ic=document.getElementById('m-img');if(d.modal.image){ic.innerHTML=`<img src="${d.modal.image}" class="w-full h-auto rounded-xl border border-white/8" alt="">`;ic.classList.remove('hidden');}else ic.classList.add('hidden');document.getElementById('m-body').innerHTML=d.modal.body.map(p=>`<p class="${p.startsWith('•')?'pl-5 border-l border-[var(--gold)]/15 text-white/60':''}">${p}</p>`).join('');mO.classList.remove('hidden');mO.classList.add('flex');setTimeout(()=>{mB.classList.remove('opacity-0');mC.classList.remove('opacity-0','scale-95');mC.classList.add('opacity-100','scale-100');},10);document.body.classList.add('modal-open');};
window.closeModal=function(){mB.classList.add('opacity-0');mC.classList.remove('opacity-100','scale-100');mC.classList.add('opacity-0','scale-95');setTimeout(()=>{mO.classList.add('hidden');mO.classList.remove('flex');document.body.classList.remove('modal-open');},500);};
mB.addEventListener('click',closeModal);

renderApp();
</script>
</body>
