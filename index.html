<div class="flex items-center justify-center pb-6 border-b border-electric-cyan/20 mb-4 shrink-0">
    <img src="https://assets.cdn.filesafe.space/NkFUgZER3rrdnofCwAIl/media/648dd017a1f733fa5b51e5e9.png" alt="Advon Media" class="h-10 w-auto drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">
</div>

<div style="width:100%;height:100%;overflow:scroll" id="advon-hero-inline-15min" class="grow pr-2"></div>

<script type="text/javascript">
  (function (w, scriptUrl, initCommand) { 
    let pushToQueue = function (apiObject, args) { apiObject.q.push(args); }; 
    let doc = w.document; 
    w.Advon = w.Advon || function () { 
      let advon = w.Advon; let args = arguments; 
      if (!advon.loaded) { 
        advon.ns = {}; advon.q = advon.q || []; 
        doc.head.appendChild(doc.createElement("script")).src = scriptUrl; 
        advon.loaded = true; 
      } 
      if (args[0] === initCommand) { 
        const api = function () { pushToQueue(api, arguments); }; 
        const namespace = args[1]; 
        api.q = api.q || []; 
        if(typeof namespace === "string"){
          advon.ns[namespace] = advon.ns[namespace] || api;
          pushToQueue(advon.ns[namespace], args);
          pushToQueue(advon, ["initNamespace", namespace]);
        } else pushToQueue(advon, args); 
        return;
      } 
      pushToQueue(advon, args); 
    }; 
    // Map existing external scripts
    w.Cal = w.Advon; 
  })(window, "https://app.cal.com/embed/embed.js", "init"); // <-- Reverted to app.cal.com

  Advon("init", "15min", {origin:"https://app.cal.com"}); // <-- Reverted to app.cal.com
  
  Advon.ns["15min"]("inline", {
    elementOrSelector:"#advon-hero-inline-15min",
    config: {"layout":"month_view","useSlotsViewOnSmallScreen":"true"},
    calLink: "advonmedia/15min",
  });
  
  Advon.ns["15min"]("ui", {
    "cssVarsPerTheme":{"light":{"cal-brand":"#5ed6e5"},"dark":{"cal-brand":"#fafafa"}},
    "hideEventTypeDetails":true, /* This hides the cal.com header */
    "layout":"month_view"
  });
</script>
