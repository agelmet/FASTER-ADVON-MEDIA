        function triggerLanguageSwitch() {
            const mainContent = document.getElementById('main-content');
            // Fade out
            mainContent.style.opacity = '0';
            
            setTimeout(() => {
                currentLang = currentLang === 'el' ? 'en' : 'el';
                document.documentElement.lang = currentLang; // Update HTML Lang Tag
                document.title = translations[currentLang].title; // Update Page Title
                
                renderApp();
                
                // Fade back in
                mainContent.style.opacity = '1';
            }, 400); // match css transition time
        }

            const t = translations[currentLang];
            const isEn = currentLang === 'en';

            // --- 1. Navigation ---

                ${['services', 'portfolio', 'reviews', 'faq', 'contact'].map(key =>

                ).join('')}
            `;

                ${['services', 'portfolio', 'reviews', 'faq', 'contact'].map(key => 
                    `<a href="#${key}" class="mobile-link" onclick="closeMobileMenu()">${t.nav[key]}</a>`
                ).join('')}
            `;

            document.getElementById('lang-btn').innerHTML = btnHtml;
